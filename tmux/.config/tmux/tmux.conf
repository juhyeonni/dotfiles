#################################################
#
#  BASIC Setting
#

set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',xterm-ghostty:Tc,xterm-256color:Tc'

set -g prefix C-a
unbind C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1

set-option -g renumber-windows on

set -s escape-time 0
set -s extended-keys on
set -as terminal-features ',xterm-ghostty:extkeys'
set-option -g mouse on

set -g history-limit 50000       # default is only 2000
set -g focus-events on           # pass FocusGained/FocusLost to nvim
set -g allow-passthrough on      # image protocol passthrough
set -g set-clipboard on          # OSC 52 clipboard (works over SSH)
set -g display-time 2000
setw -g aggressive-resize on

#################################################
#
#  KEY BINDING
#

# Vim-style pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Vim-style pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D
bind -r K resize-pane -U
bind -r L resize-pane -R 5

# Vi-mode copy (cross-platform)
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
if-shell 'uname | grep -q Darwin' \
  "bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# Split pane (keep current directory)
bind v split-window -h -c '#{pane_current_path}'    # Vertical split
bind s split-window -v -c '#{pane_current_path}'    # Horizontal split

# Reload config
bind-key -T prefix r source-file ~/.config/tmux/tmux.conf \; display-message 'Reload was successful.'

# Alt+arrow pane navigation (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Scratch terminal popup
bind g display-popup -E -w 80% -h 75% -d '#{pane_current_path}'

# Quick Claude popup (replaces default C-c new-session binding)
bind C-c display-popup -E -w 85% -h 85% -d '#{pane_current_path}' 'claude'

#################################################
#
#  KANAGAWA THEME (via plugin)
#

set -g @kanagawa-theme 'dragon'

# Status bar position
set-option -g status-position top

# Plugins to display (left to right)
set -g @kanagawa-plugins "battery network time"

# Powerline-style separators
set -g @kanagawa-show-powerline true
set -g @kanagawa-show-left-sep ''
set -g @kanagawa-show-right-sep ''

# Time format
set -g @kanagawa-time-format "%H:%M"

# Window tabs
set -g @kanagawa-window-tabs-enabled on

# Preserve Ghostty background transparency
set -g @kanagawa-ignore-window-colors true

#################################################
#
#  PLUGIN
#

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Nybkox/tmux-kanagawa'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'             # prefix+tab: fzf-pick text from screen

# Session persistence
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

#################################################
#
#  CLAUDE CODE NOTIFICATION BADGE
#

# 윈도우 포커스 시 알림 카운트 리셋
set-hook -g window-pane-changed 'set-option -wq @claude-notify-count 0; set-option -wq @claude-notify-latest 0'
set-hook -g session-window-changed 'set-option -wq @claude-notify-count 0; set-option -wq @claude-notify-latest 0'

# Auto-install TPM + plugins on a fresh machine
if "test ! -d ~/.config/tmux/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/.tmux/plugins/tpm && ~/.config/tmux/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/.tmux/plugins/tpm/tpm'

# Local plugins (managed in dotfiles, not TPM)
# tmux-translate: select with v, then press t to translate (popup)
# Options: @translate-key, @translate-model, @translate-keychain-service,
#          @translate-popup-width, @translate-popup-height
run '~/.config/tmux/tmux-translate/translate.tmux'

# Window navigation (after TPM to avoid vim-tmux-navigator override)
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# 윈도우 탭에 알림 배지(●N) + Claude 작업중(✻) 표시 (TPM/테마 로드 후 덮어쓰기)
# Kanagawa Dragon palette: bar bg #282727, fg #c5c9c5, current #625e5a,
#                          yellow #c4b28a, red #c4746e
set -g window-status-format "#[fg=#c5c9c5]#[bg=#282727] #I #W#{?@claude-busy, #[fg=#c4b28a]✻#[fg=#c5c9c5],}#{?@claude-notify-count, #[fg=#c4746e]●#{E:@claude-notify-count}#[fg=#c5c9c5],}"
set -g window-status-current-format "#[fg=#282727,bg=#625e5a]#[fg=#c5c9c5,bg=#625e5a] #I #W#{?@claude-busy, #[fg=#c4b28a]✻,} #[fg=#625e5a,bg=#282727]"
